name: Update Taxonomic Archive

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: speciedex-taxonomy-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Scan and update taxonomic archive
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          check-latest: true

      - name: Validate Python source
        run: |
          python -m py_compile static/tools/stat-grabber.py
          python -m compileall -q static/tools/speciedex_stats

      - name: Validate provider registry
        run: |
          python -m json.tool \
            static/tools/providers.json \
            >/dev/null

      - name: Display provider availability
        env:
          EOL_API_KEY: ${{ secrets.EOL_API_KEY }}
          IUCN_API_TOKEN: ${{ secrets.IUCN_API_TOKEN }}
          NATURESERVE_API_KEY: ${{ secrets.NATURESERVE_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          python static/tools/stat-grabber.py providers

      - name: Scan rotating providers
        env:
          EOL_API_KEY: ${{ secrets.EOL_API_KEY }}
          IUCN_API_TOKEN: ${{ secrets.IUCN_API_TOKEN }}
          NATURESERVE_API_KEY: ${{ secrets.NATURESERVE_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          python static/tools/stat-grabber.py scan \
            --batch-size 500 \
            --provider-budget 4 \
            --timeout 30 \
            --retries 4 \
            --backoff 2 \
            --volume-target-mb 48 \
            --volume-max-mb 90 \
            --history-limit 672 \
            --verbose

      - name: Verify taxonomic archive
        run: |
          python static/tools/stat-grabber.py verify

      - name: Validate generated JSON
        run: |
          python -m json.tool \
            static/data/statistics.json \
            >/dev/null

          python -m json.tool \
            static/data/statistics-sources.json \
            >/dev/null

          python -m json.tool \
            static/data/statistics-history.json \
            >/dev/null

          if test -f static/data/taxonomy/manifest.json
          then
            python -m json.tool \
              static/data/taxonomy/manifest.json \
              >/dev/null
          fi

          if test -f static/data/taxonomy/scheduler.json
          then
            python -m json.tool \
              static/data/taxonomy/scheduler.json \
              >/dev/null
          fi

      - name: Remove temporary SQLite files
        run: |
          find static/data/taxonomy \
            -type f \
            \( \
              -name "*.sqlite3-wal" \
              -o \
              -name "*.sqlite3-shm" \
              -o \
              -name "*.sqlite-journal" \
            \) \
            -delete

      - name: Check archive file sizes
        run: |
          python - <<'PY'
          from pathlib import Path

          limit = 95 * 1024 * 1024
          oversized = []

          for path in Path("static/data").rglob("*"):
              if not path.is_file():
                  continue

              size = path.stat().st_size

              if size >= limit:
                  oversized.append(
                      (
                          path.as_posix(),
                          size,
                      )
                  )

          if oversized:
              for path, size in oversized:
                  print(
                      f"{path}: "
                      f"{size / 1024 / 1024:.2f} MiB"
                  )

              raise SystemExit(
                  "One or more archive files are too large "
                  "for ordinary Git storage."
              )

          print(
              "All archive files remain below "
              "the configured size limit."
          )
          PY

      - name: Commit archive updates
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- static/data
          then
            printf '%s\n' \
              "No taxonomic archive changes detected."

            exit 0
          fi

          git config \
            user.name \
            "speciedex-taxonomy-bot"

          git config \
            user.email \
            "speciedex-taxonomy-bot@users.noreply.github.com"

          git add static/data

          git commit \
            -m "Update Speciedex taxonomic archive"

          for attempt in 1 2 3
          do
            printf \
              'Synchronizing with %s, attempt %s.\n' \
              "$TARGET_BRANCH" \
              "$attempt"

            if git pull \
              --rebase \
              origin \
              "$TARGET_BRANCH" &&
               git push \
              origin \
              "HEAD:$TARGET_BRANCH"
            then
              printf '%s\n' \
                "Taxonomic archive update pushed successfully."

              exit 0
            fi

            git rebase --abort 2>/dev/null || true

            sleep "$((attempt * 5))"
          done

          printf '%s\n' \
            "Unable to push the taxonomic archive update."

          exit 1
